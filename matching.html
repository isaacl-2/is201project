<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bluey Character Matching Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky-blue: rgb(136, 202, 252);
      --outline-blue: #0056b3;
      --footer-deep: #313151;
      --footer-mid: #404066;
      --footer-light: #585885;
      --tile-shadow: rgba(0, 0, 0, 0.22);
      --match-gold: #edcc6f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--sky-blue);
      color: #fff;
      font-family: "Luckiest Guy", "Trebuchet MS", "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .site-frame {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 12px 4px;
    }

    .header-logo {
      width: min(500px, 92vw);
      height: auto;
    }

    h1,
    h2 {
      margin: 0;
      text-align: center;
      color: #fff;
      text-shadow:
        -2px -2px 0 var(--outline-blue),
        2px -2px 0 var(--outline-blue),
        -2px 2px 0 var(--outline-blue),
        2px 2px 0 var(--outline-blue),
        3px 3px 5px rgba(0, 0, 0, 0.5);
      letter-spacing: 0.03em;
    }

    .game-shell {
      width: min(680px, 94vw);
      margin: 4px auto 16px;
      padding: 12px 10px 14px;
      border-radius: 20px;
      background: rgba(34, 76, 150, 0.2);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      backdrop-filter: blur(1px);
      flex: 1;
    }

    .hud {
      display: flex;
      justify-content: center;
      margin: 4px 0 10px;
    }

    .turn-counter {
      background: #ffffff;
      color: #404066;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      border: 2px solid #dbe8ff;
    }

    .game-grid {
      width: min(460px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, minmax(56px, 1fr));
      gap: clamp(8px, 1.2vw, 12px);
      perspective: 1000px;
    }

    .tile {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.2s ease;
      border-radius: 16px;
    }

    .tile:hover:not(.is-flipped):not(.is-matched),
    .tile:focus-visible:not(.is-flipped):not(.is-matched) {
      transform: translateY(-5px);
      outline: none;
    }

    .tile-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow: 0 8px 16px var(--tile-shadow);
    }

    .tile-front {
      transform: rotateY(180deg);
      background: linear-gradient(160deg, #ffffff 0%, #c8e5ff 100%);
      border: 2px solid #d0e7ff;
    }

    .tile-back {
      background: linear-gradient(160deg, #d7efff 0%, #b9e0ff 58%, #9ccffa 100%);
      border: 2px solid #82b9ea;
    }

    .tile-front img,
    .tile-back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tile-back img {
      width: 78%;
      height: 78%;
      object-fit: contain;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.3));
    }

    .tile-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.55s ease;
      border-radius: 16px;
    }

    .tile.is-flipped .tile-inner,
    .tile.is-matched .tile-inner {
      transform: rotateY(180deg);
    }

    .tile.is-matched {
      cursor: default;
    }

    .tile.is-matched .tile-front {
      box-shadow: 0 0 0 3px rgba(237, 204, 111, 0.65), 0 8px 18px var(--tile-shadow);
    }

    .status {
      margin: 10px 0 0;
      text-align: center;
      min-height: 26px;
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      text-shadow:
        -1px -1px 0 var(--outline-blue),
        1px -1px 0 var(--outline-blue),
        -1px 1px 0 var(--outline-blue),
        1px 1px 0 var(--outline-blue);
    }

    .status.is-win {
      color: var(--match-gold);
      text-shadow:
        -1px -1px 0 #7a5d14,
        1px -1px 0 #7a5d14,
        -1px 1px 0 #7a5d14,
        1px 1px 0 #7a5d14;
    }

    .back-home {
      display: block;
      width: fit-content;
      margin: 12px auto 0;
      padding: 9px 16px;
      border-radius: 999px;
      border: 2px solid #c9a64f;
      background-color: #edcc6f;
      color: #404066;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .back-home:hover,
    .back-home:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.24);
      filter: brightness(1.04);
      outline: none;
    }

    .site-footer {
      margin-top: auto;
      padding: 14px 18px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      background: linear-gradient(160deg, var(--footer-light) 0%, var(--footer-mid) 48%, var(--footer-deep) 100%);
      border-top: 2px solid #7a7ab0;
    }

    .footer-logo {
      width: 78px;
      height: auto;
      opacity: 0.96;
    }

    .footer-links a {
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #e6e9ff;
      text-decoration: none;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .footer-links a:hover,
    .footer-links a:focus-visible {
      color: #ffffff;
      border-bottom-color: #b8c2ff;
      outline: none;
    }

    @media (max-width: 640px) {
      .game-shell {
        padding: 14px 10px 18px;
        border-radius: 18px;
      }

      .game-grid {
        gap: 10px;
      }

      .site-footer {
        padding: 16px 14px;
      }

      .footer-logo {
        width: 74px;
      }
    }
  </style>
</head>
<body>
  <div class="site-frame">
    <header>
      <img class="header-logo" src="images/bluey_logo.png" alt="Bluey logo">
    </header>

    <main class="game-shell" aria-label="Bluey Character Matching Game">
      <h1>Character Matching Game</h1>
      <div class="hud">
        <div class="turn-counter" id="turnCounter" aria-live="polite">Turns: 0</div>
      </div>
      <section class="game-grid" id="gameGrid" aria-label="4 by 4 matching game board"></section>
      <p class="status" id="statusMessage" aria-live="polite"></p>
      <a class="back-home" href="scratch.html">Back to Home</a>
    </main>

    <footer class="site-footer">
      <img class="footer-logo" src="images/bluey_logo.png" alt="Bluey mini logo">
      <nav class="footer-links" aria-label="Footer links">
        <a href="https://www.bluey.tv" target="_blank" rel="noopener noreferrer">Official Website</a>
      </nav>
    </footer>
  </div>

  <script>
    const characterCards = [
      { name: "Bluey", image: "images/bluey.png" },
      { name: "Bingo", image: "images/Bingo_Website.webp" },
      { name: "Chilli", image: "images/Chilli_Website.webp" },
      { name: "Bandit", image: "images/bandit.webp" },
      { name: "Mackenzie", image: "images/Mackenzie.webp" },
      { name: "Lucky", image: "images/lucky.png" },
      { name: "Coco", image: "images/coco.webp" },
      { name: "Jean Luc", image: "images/jean-luc.png" }
    ];

    const grid = document.getElementById("gameGrid");
    const turnCounter = document.getElementById("turnCounter");
    const statusMessage = document.getElementById("statusMessage");

    let turns = 0;
    let firstPick = null;
    let secondPick = null;
    let lockBoard = false;
    let matchesFound = 0;

    function shuffleCards(cards) {
      const copy = [...cards];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateTurns() {
      turnCounter.textContent = `Turns: ${turns}`;
    }

    function createBoard() {
      const deck = shuffleCards([...characterCards, ...characterCards]);
      deck.forEach((cardData, index) => {
        const tile = document.createElement("button");
        tile.type = "button";
        tile.className = "tile";
        tile.setAttribute("aria-label", `Hidden tile ${index + 1}`);
        tile.dataset.name = cardData.name;

        tile.innerHTML = `
          <span class="tile-inner">
            <span class="tile-face tile-front">
              <img src="${cardData.image}" alt="${cardData.name}">
            </span>
            <span class="tile-face tile-back">
              <img src="images/bluey_logo.png" alt="Bluey logo card back">
            </span>
          </span>
        `;

        tile.addEventListener("click", handleTileClick);
        grid.appendChild(tile);
      });
    }

    function handleTileClick(event) {
      const clickedTile = event.currentTarget;

      if (lockBoard || clickedTile === firstPick || clickedTile.classList.contains("is-matched")) {
        return;
      }

      clickedTile.classList.add("is-flipped");

      if (!firstPick) {
        firstPick = clickedTile;
        return;
      }

      secondPick = clickedTile;
      turns += 1;
      updateTurns();
      checkMatch();
    }

    function checkMatch() {
      if (!firstPick || !secondPick) {
        return;
      }

      const isMatch = firstPick.dataset.name === secondPick.dataset.name;

      if (isMatch) {
        firstPick.classList.add("is-matched");
        secondPick.classList.add("is-matched");
        matchesFound += 1;
        resetTurn();

        if (matchesFound === characterCards.length) {
          statusMessage.textContent = `You matched all 8 pairs in ${turns} turns!`;
          statusMessage.classList.add("is-win");
        }
      } else {
        lockBoard = true;
        setTimeout(() => {
          firstPick.classList.remove("is-flipped");
          secondPick.classList.remove("is-flipped");
          resetTurn();
        }, 900);
      }
    }

    function resetTurn() {
      [firstPick, secondPick] = [null, null];
      lockBoard = false;
    }

    createBoard();
    updateTurns();
  </script>
</body>
</html>
